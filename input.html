<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Input Type 테스트 페이지</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    section { margin-bottom: 30px; }
    label { display: block; margin-top: 10px; }
    input, select, textarea { margin-top: 5px; padding: 5px; }
  </style>
</head>
<body>
  <h1>HTML Input Type 테스트</h1>

  <form>
    <section>
      <h2>텍스트 계열</h2>
      <label>text: <input type="text" placeholder="텍스트 입력"></label>
      <label>password: <input type="password"></label>
      <label>email: <input type="email"></label>
      <label>search: <input type="search"></label>
      <label>tel: <input type="tel"></label>
      <label>url: <input type="url"></label>
    </section>

    <section>
      <h2>숫자 및 범위</h2>
      <label>number: <input type="number" min="0" max="100"></label>
      <label>range: <input type="range" min="0" max="100"></label>
    </section>

    <section>
      <h2>날짜 및 시간</h2>
      <label>date: <input type="date"></label>
      <label>datetime-local: <input type="datetime-local"></label>
      <label>month: <input type="month"></label>
      <label>week: <input type="week"></label>
      <label>time: <input type="time"></label>
    </section>

    <section>
      <h2>선택 관련</h2>
      <label>checkbox: <input type="checkbox"> 체크</label>
      <label>radio:
        <input type="radio" name="r"> A
        <input type="radio" name="r"> B
      </label>
      <label>select:
        <select>
          <option>옵션 1</option>
          <option>옵션 2</option>
        </select>
      </label>
    </se
