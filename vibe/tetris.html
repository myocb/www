7가지 테트로미노(I, O, T, S, Z, J, L) 구현

각 블록은 실제 테트리스와 동일한 색상으로

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap');

:root {
  --bg: #0a0a0f;
  --panel: #0f0f1a;
  --border: #1e1e30;
  --accent: #00f5ff;
  --accent2: #ff006e;
  --text: #e0e0ff;
  --dim: #4a4a6a;
  --glow: 0 0 18px rgba(0,245,255,0.45);
  --glow2: 0 0 18px rgba(255,0,110,0.45);
}

*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Orbitron', monospace;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 15% 15%, rgba(0,245,255,0.06) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 85%, rgba(255,0,110,0.06) 0%, transparent 55%);
  pointer-events: none; z-index: 0;
}

body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
  );
  pointer-events: none; z-index: 100;
}

#app {
  position: relative; z-index: 1;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#title {
  font-family: 'Press Start 2P', monospace;
  letter-spacing: 6px;
  color: var(--accent);
  text-shadow: var(--glow);
  flex-shrink: 0;
}
#title span { color: var(--accent2); text-shadow: var(--glow2); }

#game-row {
  display: flex;
  flex-direction: row;
  align-items: flex-start;
  flex-shrink: 0;
}

#gameCanvas {
  border: 1px solid var(--accent);
  box-shadow: var(--glow), inset 0 0 30px rgba(0,245,255,0.03);
  display: block;
  background: #050508;
  image-rendering: pixelated;
  flex-shrink: 0;
}

#side-panel {
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}

.p-box {
  background: var(--panel);
  border: 1px solid var(--border);
  position: relative;
  flex-shrink: 0;
}
.p-box::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}
.p-label {
  letter-spacing: 2px;

}

}

.level-bar {

}

#nextCanvas { display: block; image-rendering: pixelated; }

.kb-hint { line-height: 2; letter-spacing: 0.5px; }
.kb-hint b { color: var(--accent); font-weight: 400; }

/* ── 가상 키패드 ── */
#vpad {
  flex-direction: column;
  align-items: center;
  flex-shrink: 0;
}

.vpad-row {

}

.vbtn {

  display: flex;
  align-items: center;
  justify-content: center;

  touch-action: none;

}
.vbtn:active, .vbtn.pressed {

  transform: scale(0.90);

}
.vbtn.drop-btn {
  color: var(--accent2);
  border-color: rgba(255,0,110,0.35);
}
.vbtn.drop-btn:active, .vbtn.drop-btn.pressed {

}

/* ── 오버레이 ── */
#overlay {
  position: fixed; inset: 0;
  background: rgba(5,5,8,0.93);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 300;
  backdrop-filter: blur(6px);
}
.ov-title {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(16px, 5vw, 28px);
  color: var(--accent);

}

.ov-btn:hover { color: var(--bg); box-shadow: var(--glow); }

</style>

<body>
<div id="app">
  <div id="title">TET<span>RI</span>S</div>

  <div id="game-row">
    <canvas id="gameCanvas"></canvas>
    <div id="side-panel">
      <div class="p-box" id="box-next">
        <div class="p-label">NEXT</div>
        <canvas id="nextCanvas"></canvas>
      </div>
      <div class="p-box" id="box-score">
        <div class="p-label">SCORE</div>
        <div class="p-value" id="scoreVal">0</div>
      </div>
      <div class="p-box" id="box-level">
        <div class="p-label">LEVEL</div>
        <div class="p-value" id="levelVal">1</div>
        <div class="level-bar-wrap"><div class="level-bar" id="levelBar"></div></div>
      </div>
      <div class="p-box" id="box-lines">
        <div class="p-label">LINES</div>

      </div>

          <b>← →</b> 이동<br>

      <button class="vbtn" id="vbtn-left">←</button>
      <button class="vbtn" id="vbtn-down">↓</button>
      <button class="vbtn" id="vbtn-right">→</button>

<div id="overlay">
  <div class="ov-title" id="ovTitle">TETRIS</div>
  <div class="ov-score" id="ovScore"></div>
  <button class="ov-btn" id="ovBtn">START GAME</button>
</div>

<script>
// ── 상수 ──────────────────────────────────────────────
const COLS = 10, ROWS = 20;
const COLORS = {
  I:'#00f5ff', O:'#ffe000', T:'#c000ff',
  S:'#00e676', Z:'#ff1744', J:'#2979ff', L:'#ff6d00'
};
const PIECES = {
  I:{shape:[[1,1,1,1]],        color:COLORS.I},
  O:{shape:[[1,1],[1,1]],      color:COLORS.O},
  T:{shape:[[0,1,0],[1,1,1]], color:COLORS.T},
  S:{shape:[[0,1,1],[1,1,0]], color:COLORS.S},
  Z:{shape:[[1,1,0],[0,1,1]], color:COLORS.Z},
  J:{shape:[[1,0,0],[1,1,1]], color:COLORS.J},
  L:{shape:[[0,0,1],[1,1,1]], color:COLORS.L},
};
const PKEYS = Object.keys(PIECES);
const SCORE_TABLE = [0, 100, 300, 500, 800];
const levelSpeed  = l => Math.max(80, 800 - (l-1)*70);

// ── DOM 참조 ──────────────────────────────────────────
const canvas  = document.getElementById('gameCanvas');
const ctx     = canvas.getContext('2d');
const nCanvas = document.getElementById('nextCanvas');
const nCtx    = nCanvas.getContext('2d');

// ── 레이아웃 변수 ─────────────────────────────────────
let BLOCK = 30, NEXT_SZ = 24;

function isMobile(){
  return ('ontouchstart' in window) || (window.innerWidth <= 680);
}

function applyLayout(){
  const W = window.innerWidth;
  const H = window.innerHeight;
  const mobile = isMobile();

  if(mobile){
    /* ── 모바일 ──────────────────────────────────────
       화면을 4 구역으로 배분: 제목 / 게임행 / 키패드
       키패드를 먼저 예약하고 나머지로 게임 크기 결정 */
    const TITLE_H  = 28;
    const TITLE_MG = 5;
    const GAME_MG  = 6;    // 게임↔키패드 간격
    const PAD_V    = 10;   // 상하 여백

    // 키패드 버튼 크기: 화면 폭 기준, 최소 44px
    const bs = Math.max(44, Math.min(Math.floor(W * 0.155), 62));
    const bg = Math.max(6, Math.floor(bs * 0.14));
    const VPAD_H = bs * 3 + bg * 2 + bg; // 3행 + 2간격 + 약간의 패딩

    // 패널 폭
    const panelW = Math.max(72, Math.floor(W * 0.215));
    const panelGap = 5;

    const availH = H - TITLE_H - TITLE_MG - GAME_MG - VPAD_H - PAD_V;
    const availW = W - panelW - panelGap - 2;
    BLOCK = Math.max(14, Math.min(Math.floor(availW / COLS), Math.floor(availH / ROWS)));
    NEXT_SZ = Math.max(12, Math.floor(BLOCK * 0.8));

    canvas.width  = COLS * BLOCK;
    canvas.height = ROWS * BLOCK;
    nCanvas.width  = 4 * NEXT_SZ;
    nCanvas.height = 4 * NEXT_SZ;

    // 제목
    const t = document.getElementById('title');
    t.style.fontSize = '13px';
    t.style.letterSpacing = '3px';
    t.style.marginBottom = TITLE_MG + 'px';

    // 게임 행
    const gr = document.getElementById('game-row');
    gr.style.gap = panelGap + 'px';
    gr.style.marginBottom = GAME_MG + 'px';

    // 사이드 패널
    const sp = document.getElementById('side-panel');
    sp.style.width = panelW + 'px';
    sp.style.gap = '3px';

    const pBoxPad = '5px 6px';
    document.querySelectorAll('.p-box').forEach(el => el.style.padding = pBoxPad);
    document.querySelectorAll('.p-label').forEach(el => {
      el.style.fontSize = '6px'; el.style.marginBottom = '2px';
    });
    document.querySelectorAll('.p-value').forEach(el => {
      el.style.fontSize = Math.max(11, Math.floor(panelW * 0.16)) + 'px';
    });

    // 키 힌트 숨김
    document.getElementById('box-keys').style.display = 'none';

    // 가상 키패드 표시
    const vp = document.getElementById('vpad');
    vp.style.display = 'flex';
    vp.style.gap = '0';

    document.querySelectorAll('.vbtn').forEach(el => {
      el.style.width  = bs + 'px';
      el.style.height = bs + 'px';
      el.style.fontSize = Math.floor(bs * 0.38) + 'px';
    });
    // drop 버튼 폭
    const dropW = bs * 3 + bg * 2;
    const dBtn = document.getElementById('vbtn-drop');
    dBtn.style.width = dropW + 'px';
    dBtn.style.fontSize = Math.floor(bs * 0.21) + 'px';

    document.getElementById('vrow1').style.marginBottom = bg + 'px';
    document.getElementById('vrow2').style.gap = bg + 'px';
    document.getElementById('vrow2').style.marginBottom = bg + 'px';
    document.getElementById('vrow3').style.gap = bg + 'px';

  } else {
    /* ── 데스크톱 ──────────────────────────────────── */
    const TITLE_H  = 46;
    const TITLE_MG = 14;
    const PANEL_W  = 125;
    const PANEL_GAP = 14;
    const PAD      = 20;

    const availH = H - TITLE_H - TITLE_MG - PAD * 2;
    const availW = W - PANEL_W - PANEL_GAP - PAD * 2;
    BLOCK = Math.max(22, Math.min(Math.floor(availW / COLS), Math.floor(availH / ROWS)));
    NEXT_SZ = Math.floor(BLOCK * 0.84);

    canvas.width  = COLS * BLOCK;
    canvas.height = ROWS * BLOCK;
    nCanvas.width  = 4 * NEXT_SZ;
    nCanvas.height = 4 * NEXT_SZ;

    const t = document.getElementById('title');
    t.style.fontSize = '22px';
    t.style.letterSpacing = '6px';
    t.style.marginBottom = TITLE_MG + 'px';

    const gr = document.getElementById('game-row');
    gr.style.gap = PANEL_GAP + 'px';
    gr.style.marginBottom = '0';

    const sp = document.getElementById('side-panel');
    sp.style.width = PANEL_W + 'px';
    sp.style.gap = '8px';

    document.querySelectorAll('.p-box').forEach(el => el.style.padding = '10px 12px');
    document.querySelectorAll('.p-label').forEach(el => {
      el.style.fontSize = '7px'; el.style.marginBottom = '3px';
    });
    document.querySelectorAll('.p-value').forEach(el => el.style.fontSize = '18px');

    const kb = document.getElementById('box-keys');
    kb.style.display = 'block';
    const kh = kb.querySelector('.kb-hint');
    kh.style.fontSize = '7px';
    kh.style.color = 'var(--dim)';

    document.getElementById('vpad').style.display = 'none';
  }
}

// ── 게임 상태 ─────────────────────────────────────────
let board, current, next, score, level, lines, gameOver, paused;
let dropTimer=0, lastTime=0, animId=null;
let flashRows=[], flashUntil=0;

function newPiece(){
  const k=PKEYS[Math.floor(Math.random()*PKEYS.length)];
  const t=PIECES[k];
  return { type:k, color:t.color,
    shape:t.shape.map(r=>[...r]),
    x:Math.floor((COLS-t.shape[0].length)/2), y:0 };
}

function initGame(){
  board=Array.from({length:ROWS},()=>Array(COLS).fill(null));
  score=0; level=1; lines=0;
  gameOver=false; paused=false;
  flashRows=[]; flashUntil=0;
  current=newPiece(); next=newPiece();
  updateUI();
}

// ── 충돌·회전 ─────────────────────────────────────────
function collides(p, ox=0, oy=0, sh=p.shape){
  for(let r=0;r<sh.length;r++)
    for(let c=0;c<sh[r].length;c++){
      if(!sh[r][c]) continue;
      const nx=p.x+c+ox, ny=p.y+r+oy;
      if(nx<0||nx>=COLS||ny>=ROWS) return true;
      if(ny>=0&&board[ny][nx]) return true;
    }
  return false;
}

function rotate(sh){
  const R=sh.length,C=sh[0].length;
  const o=Array.from({length:C},()=>Array(R).fill(0));
  for(let r=0;r<R;r++) for(let c=0;c<C;c++) o[c][R-1-r]=sh[r][c];
  return o;
}

function tryMove(ox,oy){ if(!collides(current,ox,oy)){current.x+=ox;current.y+=oy;return true;} return false; }

function tryRotate(){
  const ns=rotate(current.shape);
  for(const k of [0,-1,1,-2,2])
    if(!collides({...current,shape:ns},k,0)){ current.shape=ns; current.x+=k; return; }
}

function ghostY(){ let g=current.y; while(!collides({...current,y:g+1}))g++; return g; }

function hardDrop(){ while(!collides(current,0,1))current.y++; lock(); }

function lock(){
  current.shape.forEach((row,r)=>row.forEach((v,c)=>{
    if(v&&current.y+r>=0) board[current.y+r][current.x+c]=current.color;
  }));
  checkLines();
  current=next; next=newPiece();
  if(collides(current)){ gameOver=true; showOverlay(true); }
}

function checkLines(){
  const full=[];
  for(let r=0;r<ROWS;r++) if(board[r].every(c=>c!==null)) full.push(r);
  if(!full.length) return;
  flashRows=full; flashUntil=performance.now()+180;
  setTimeout(()=>{
    full.forEach(r=>{ board.splice(r,1); board.unshift(Array(COLS).fill(null)); });
    flashRows=[];
    const n=full.length;
    lines+=n; score+=SCORE_TABLE[n]*level;
    level=Math.floor(lines/10)+1;
    updateUI();
  },180);
}

// ── 렌더링 ───────────────────────────────────────────
function drawBlock(c, x, y, color, sz, alpha=1){
  const pad=sz*0.05;
  c.save(); c.globalAlpha=alpha;
  c.fillStyle=color;
  c.fillRect(x*sz+pad,y*sz+pad,sz-pad*2,sz-pad*2);
  const g=c.createLinearGradient(x*sz,y*sz,x*sz+sz,y*sz+sz);
  g.addColorStop(0,'rgba(255,255,255,0.22)');
  g.addColorStop(.5,'rgba(255,255,255,0.04)');
  g.addColorStop(1,'rgba(0,0,0,0.18)');
  c.fillStyle=g;
  c.fillRect(x*sz+pad,y*sz+pad,sz-pad*2,sz-pad*2);
  c.strokeStyle='rgba(255,255,255,0.12)';
  c.lineWidth=1;
  c.strokeRect(x*sz+pad+1,y*sz+pad+1,sz-pad*2-2,sz-pad*2-2);
  c.restore();
}

function render(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='rgba(255,255,255,0.03)'; ctx.lineWidth=1;
  for(let r=0;r<ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*BLOCK);ctx.lineTo(canvas.width,r*BLOCK);ctx.stroke();}
  for(let c=0;c<COLS;c++){ctx.beginPath();ctx.moveTo(c*BLOCK,0);ctx.lineTo(c*BLOCK,canvas.height);ctx.stroke();}

  const now=performance.now();
  const flashing=flashRows.length>0&&now<flashUntil;
  board.forEach((row,r)=>row.forEach((color,c)=>{
    if(!color) return;
    if(flashing&&flashRows.includes(r)){
      const blink=Math.floor((flashUntil-now)/40)%2===0;
      drawBlock(ctx,c,r,blink?'#ffffff':color,BLOCK);
    } else drawBlock(ctx,c,r,color,BLOCK);
  }));

  if(!gameOver&&!paused){
    const gy=ghostY();
    if(gy!==current.y)
      current.shape.forEach((row,r)=>row.forEach((v,c)=>{
        if(v) drawBlock(ctx,current.x+c,gy+r,current.color,BLOCK,0.14);
      }));
    current.shape.forEach((row,r)=>row.forEach((v,c)=>{
      if(v&&current.y+r>=0) drawBlock(ctx,current.x+c,current.y+r,current.color,BLOCK);
    }));
  }

  if(paused){
    ctx.fillStyle='rgba(5,5,8,0.65)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.save();
    ctx.fillStyle='#00f5ff';
    ctx.font=`bold ${Math.round(BLOCK*1.1)}px Orbitron`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='#00f5ff'; ctx.shadowBlur=20;
    ctx.fillText('PAUSED',canvas.width/2,canvas.height/2);
    ctx.restore();
  }

  // 다음 블록
  nCtx.clearRect(0,0,nCanvas.width,nCanvas.height);
  const s=next.shape;
  const ox=Math.floor((4-s[0].length)/2), oy=Math.floor((4-s.length)/2);
  s.forEach((row,r)=>row.forEach((v,c)=>{
    if(v) drawBlock(nCtx,ox+c,oy+r,next.color,NEXT_SZ);
  }));
}

// ── 게임 루프 ─────────────────────────────────────────
function loop(ts=0){
  if(gameOver){render();return;}
  const dt=ts-lastTime; lastTime=ts;
  if(!paused){
    dropTimer+=dt;
    if(dropTimer>=levelSpeed(level)){
      dropTimer=0;
      if(!collides(current,0,1)) current.y++;
      else lock();
    }
  }
  render();
  animId=requestAnimationFrame(loop);
}

function updateUI(){
  document.getElementById('scoreVal').textContent=score.toLocaleString();
  document.getElementById('levelVal').textContent=level;
  document.getElementById('linesVal').textContent=lines;
  document.getElementById('levelBar').style.width=((lines%10)/10*100)+'%';
}

// ── 오버레이 ─────────────────────────────────────────
function showOverlay(isGO=false){
  const ov=document.getElementById('overlay');
  const t=document.getElementById('ovTitle');
  const sc=document.getElementById('ovScore');
  const btn=document.getElementById('ovBtn');
  ov.style.display='flex';
  if(isGO){
    t.textContent='GAME OVER'; t.className='ov-title go';
    sc.innerHTML=`점수 <span style="color:var(--accent)">${score.toLocaleString()}</span><br>레벨 <span style="color:var(--accent)">${level}</span>&nbsp;&nbsp;줄 <span style="color:var(--accent)">${lines}</span>`;
    btn.textContent='PLAY AGAIN';
  } else {
    t.textContent='TETRIS'; t.className='ov-title';
    sc.innerHTML=''; btn.textContent='START GAME';
  }
}

document.getElementById('ovBtn').addEventListener('click',()=>{
  document.getElementById('overlay').style.display='none';
  if(animId) cancelAnimationFrame(animId);
  initGame();
  dropTimer=0; lastTime=0;
  requestAnimationFrame(loop);
});

// ── 키보드 ───────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(gameOver||document.getElementById('overlay').style.display!=='none') return;
  switch(e.code){
    case'ArrowLeft': e.preventDefault(); tryMove(-1,0); break;
    case'ArrowRight':e.preventDefault(); tryMove(1,0);  break;
    case'ArrowDown': e.preventDefault();
      if(!collides(current,0,1))current.y++; else lock();
      dropTimer=0; break;
    case'ArrowUp':   e.preventDefault(); tryRotate(); break;
    case'Space':     e.preventDefault(); hardDrop();  break;
    case'KeyP':      paused=!paused; break;
  }
});

// ── 가상 키패드 ──────────────────────────────────────
function bindVBtn(id, fn, repeat=false){
  const el=document.getElementById(id);
  let iv=null;
  const act=()=>{
    if(gameOver||document.getElementById('overlay').style.display!=='none') return;
    fn();
  };
  const start=e=>{
    e.preventDefault();
    el.classList.add('pressed');
    act();
    if(repeat) iv=setInterval(act,95);
  };
  const end=()=>{ el.classList.remove('pressed'); clearInterval(iv); iv=null; };
  el.addEventListener('touchstart',start,{passive:false});
  el.addEventListener('touchend',end);
  el.addEventListener('touchcancel',end);
  el.addEventListener('mousedown',start);
  el.addEventListener('mouseup',end);
  el.addEventListener('mouseleave',end);
}

bindVBtn('vbtn-left',  ()=>tryMove(-1,0), true);
bindVBtn('vbtn-right', ()=>tryMove(1,0),  true);
bindVBtn('vbtn-down',  ()=>{ if(!collides(current,0,1))current.y++; else lock(); dropTimer=0; }, true);
bindVBtn('vbtn-rotate',()=>tryRotate());
bindVBtn('vbtn-drop',  ()=>hardDrop());

// 터치 스크롤 방지
document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});

// ── 초기화 ───────────────────────────────────────────
applyLayout();
showOverlay(false);

window.addEventListener('resize',()=>{ applyLayout(); render(); });
</script>
</body>
</html>
